// Chart.js Bar Chart component
const BarChartCJ=({data,labelKey,valueKey,label,color="#4f46e5",height=260,formatter})=>{
  const ref=React.useRef(null);
  const inst=React.useRef(null);
  React.useEffect(()=>{
    if(!ref.current)return;
    if(inst.current)inst.current.destroy();
    inst.current=new Chart(ref.current,{
      type:"bar",
      data:{labels:data.map(d=>d[labelKey]),datasets:[{label,data:data.map(d=>d[valueKey]),backgroundColor:data.map((_,i)=>COLORS[i%COLORS.length]),borderRadius:4,borderSkipped:false}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>formatter?formatter(ctx.raw):"₱"+Math.round(ctx.raw).toLocaleString("en-PH")}}},scales:{x:{grid:{display:false},ticks:{font:{size:11}}},y:{grid:{color:"#f0f0f0"},ticks:{font:{size:11},callback:v=>"₱"+(v/1e6).toFixed(1)+"M"}}}}
    });
    return()=>{if(inst.current)inst.current.destroy();};
  },[JSON.stringify(data)]);
  return React.createElement("div",{style:{position:"relative",height}},React.createElement("canvas",{ref,role:"img","aria-label":label}));
};

function App(){

  const [agents,setAgents]=useState({intl:INTL_AGENTS,dom:DOM_AGENTS,sm:SM_AGENTS,rob:ROB_AGENTS,corp:CORP_AGENTS});
  // SEPARATE STATE for Agent Progress tab — never overwrites per-dept agents
  const [progressAgents,setProgressAgents]=useState([]);
  const [progressMonth,setProgressMonth]=useState(CURRENT_MONTH);

  const SHEET_ID="1giaUbA2D2s5M9IzMOy85FpQL8u86YcyqVMzB5wZy1EY";
  const GID="140575773";

  // Fetch via API proxy first, fallback to direct Google Sheets URL
  const fetchCSV=async(gid)=>{
    try{
      const r=await fetch("/api/sheets?gid="+gid);
      if(r.ok){const t=await r.text();if(t&&t.length>100)return t;}
    }catch(e){}
    try{
      const url="https://docs.google.com/spreadsheets/d/"+SHEET_ID+"/export?format=csv&gid="+gid;
      const r=await fetch(url);
      if(r.ok)return await r.text();
    }catch(e){}
    throw new Error("Cannot fetch sheet gid="+gid);
  };

  // Shared CSV line parser
  const parseCSVLine=(line)=>{
    const vals=[];let cur="",inQ=false;
    for(const c of line){if(c==='"')inQ=!inQ;else if(c===","&&!inQ){vals.push(cur.replace(/"/g,"").trim());cur="";}else cur+=c;}
    vals.push(cur.replace(/"/g,"").trim());
    return vals;
  };

  const toN=v=>parseFloat((v||"0").replace(/[₱,\s%]/g,""))||0;

  // Shared parse function for AGENT PROGRESS (UPDATED) sheet
  const parseAgentProgressSheet=(text)=>{
    const lines=text.trim().split("\n").filter(l=>l.trim());
    if(lines.length<5)return null;

    // Scan first 10 rows to find the NAME header row
    let nameCol=0,statusCol=2,tgtCol=3,gpCol=6,srpCol=9,compCol=7,teamColAP=-1,dataStart=1;
    for(let i=0;i<Math.min(10,lines.length);i++){
      const v=parseCSVLine(lines[i]).map(x=>x.toUpperCase().trim());
      if(v.includes("NAME")){
        nameCol=v.findIndex(x=>x==="NAME");
        const si=v.findIndex(x=>x.includes("STATUS")&&!x.includes("MONTH"));if(si>=0)statusCol=si;
        const ti=v.findIndex(x=>x.includes("TARGET")&&x.includes("GROSS"));if(ti>=0)tgtCol=ti;
        const gi=v.findIndex(x=>x.includes("ACTUAL")&&x.includes("GROSS"));if(gi>=0)gpCol=gi;
        const ri=v.findIndex(x=>x.includes("ACTUAL")&&x.includes("SRP")&&x.includes("MONTH"));
        const ri2=v.findIndex(x=>x.includes("ACTUAL MONTH TO DATE SRP"));
        srpCol=ri>=0?ri:(ri2>=0?ri2:9);
        const ci=v.findIndex(x=>x.includes("COMPLETION")&&x.includes("MONTHLY"));if(ci>=0)compCol=ci;
        const tmi=v.findIndex(x=>x==="TEAM"||x==="TEAMS"||x==="TL"||x==="TEAM LEADER");if(tmi>=0)teamColAP=tmi;
        dataStart=i+1;
        break;
      }
    }

    const buckets={intl:[],dom:[],sm:[],rob:[],corp:[]};
    let sec="";

    for(let i=dataStart;i<lines.length;i++){
      const vals=parseCSVLine(lines[i]);
      const rowStr=vals.join(" ").toUpperCase();

      // Section header detection — be broad, check full row
      if(rowStr.includes("MAIN INTERNATIONAL")&&!rowStr.includes("₱")){sec="intl";continue;}
      if(rowStr.includes("MAIN DOMESTIC")&&!rowStr.includes("₱")){sec="dom";continue;}
      if((rowStr.includes("SM MANILA")||rowStr.includes("SM MANILA BRANCH"))&&!rowStr.includes("₱")){sec="sm";continue;}
      if(rowStr.includes("ROBINSON")&&!rowStr.includes("₱")){sec="rob";continue;}
      // Corp — match many variations: CORP DEPT, CORPORATE, CORP DEPARTMENT, CORP only
      if((rowStr.includes("CORP DEPT")||rowStr.includes("CORPORATE")||rowStr.includes("CORP DEPARTMENT")||
         (rowStr.includes("CORP")&&!rowStr.includes("INCORPORAT")))&&!rowStr.includes("₱")){
        console.log("Corp section found at row "+i+": "+vals.slice(0,3).join("|"));
        sec="corp";continue;
      }
      if(!sec)continue;

      const name=(vals[nameCol]||vals[0]||"").trim();
      if(!name)continue;
      const nu=name.toUpperCase();
      // Skip header/summary rows
      if(nu==="NAME"||nu.includes("GRAND TOTAL")||nu.includes("SEND THIS")||
         nu.includes("NOTE:")||nu.includes("TOTAL AGENTS")||nu.includes("AMOUNTS")||
         nu.includes("HARD CODED")||nu.includes("FORMULATED")||nu.includes("AGENT TARGET"))continue;
      if(name.length>80||/^[0-9]/.test(name))continue;

      const status=(vals[statusCol]||vals[2]||"Regular").trim();
      if(status.toUpperCase().includes("STATUS")||status.toUpperCase().includes("REGULAR/PROBI")||
         status.toUpperCase().includes("HARD CODED")||status.toUpperCase().includes("FORMULATED"))continue;

      const tgt=toN(vals[tgtCol]||"0")||210000;
      const gp=toN(vals[gpCol]||"0");
      const srp=toN(vals[srpCol]||"0");
      if(gp<=0&&srp<=0)continue;

      const rawComp=(vals[compCol]||"").replace(/[%\s]/g,"");
      const comp=parseFloat(rawComp)||Math.round((gp/tgt)*100);
      const deptNames={intl:"MAIN INTERNATIONAL",dom:"MAIN DOMESTIC",sm:"SM MANILA",rob:"ROBINSONS",corp:"CORP"};
      const apTeam=teamColAP>=0?(vals[teamColAP]||"").trim():"";
      // SM: use smTeamMap (TEAM A/TEAM B from SM Explorer)
      // DOM: use apTeam from sheet (TEAM TL - XXX format) then DOM_TEAM_MAP
      // INTL: use INTL_TEAM_MAP then apTeam
      // ROB: always ROBINSONS BRANCH
      // CORP: always CORP DEPT
      const smT=smTeamMap[nu]||(apTeam&&(apTeam==="TEAM A"||apTeam==="TEAM B")?apTeam:"SM MANILA BRANCH");
      const teamName=
        sec==="intl"?(INTL_TEAM_MAP[nu]||apTeam||"—"):
        sec==="dom"?(apTeam&&apTeam.includes("TEAM")?apTeam:DOM_TEAM_MAP[nu]||apTeam||"—"):
        sec==="sm"?smT:
        sec==="rob"?"ROBINSONS BRANCH":
        sec==="corp"?"CORP DEPT":"—";

      buckets[sec].push({
        name,team:teamName,status:status||"Regular",target:tgt,
        actual_gp:gp,actual_srp:srp,
        completion:Math.abs(comp)>500?Math.round((gp/tgt)*100):Math.abs(comp),
        dp:toN(vals[10]||"0"),combined_gp:toN(vals[11]||"0"),
        department:deptNames[sec]
      });
    }

    // Deduplicate each bucket
    const result={};
    Object.entries(buckets).forEach(([k,v])=>{
      const seen=new Set();
      result[k]=v.filter(a=>{
        if(seen.has(a.name.toUpperCase()))return false;
        seen.add(a.name.toUpperCase());return true;
      });
    });
    const total=Object.values(result).reduce((s,v)=>s+v.length,0);
    console.log("parseAgentProgressSheet: "+total+" agents — "+Object.entries(result).map(([k,v])=>k+":"+v.length).join(", "));
    return total>0?result:null;
  };

  // Month GID map — each month has its own sheet tab
  // Current month = AGENT PROGRESS (UPDATED), past months from LEADERBOARD REPORT or monthly tabs
  const MONTH_GIDS={
    "Jun 2026":"140575773",  // AGENT PROGRESS (UPDATED) — current
    "May 2026":"140575773",  // Will filter by MONTHLY col = 2026-05
    "Apr 2026":"140575773",
    "Mar 2026":"140575773",
    "Feb 2026":"140575773",
    "Jan 2026":"140575773",
  };
  const MONTH_LIST=Object.keys(MONTH_GIDS);

  // ─── GONG SOUND via Web Audio API ────────────────────────────────────────────
  const playGong=()=>{
    try{
      const ctx=new(window.AudioContext||window.webkitAudioContext)();
      const playTone=(freq,start,dur,vol=0.5)=>{
        const o=ctx.createOscillator();
        const g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.frequency.setValueAtTime(freq,ctx.currentTime+start);
        o.type="sine";
        g.gain.setValueAtTime(0,ctx.currentTime+start);
        g.gain.linearRampToValueAtTime(vol,ctx.currentTime+start+0.01);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+start+dur);
        o.start(ctx.currentTime+start);
        o.stop(ctx.currentTime+start+dur);
      };
      // Gong: deep resonant strike + harmonics
      playTone(80,0,3.0,0.6);   // fundamental
      playTone(160,0,2.5,0.4);  // 2nd harmonic
      playTone(253,0,2.0,0.3);  // 3rd harmonic
      playTone(400,0,1.5,0.2);  // overtone
      playTone(80,0.05,3.0,0.3);// slight delay for resonance
    }catch(e){console.log("Audio not available");}
  };

  const playChime=()=>{
    try{
      const ctx=new(window.AudioContext||window.webkitAudioContext)();
      const playTone=(freq,start,dur,vol=0.4)=>{
        const o=ctx.createOscillator();
        const g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.frequency.setValueAtTime(freq,ctx.currentTime+start);
        o.type="sine";
        g.gain.setValueAtTime(0,ctx.currentTime+start);
        g.gain.linearRampToValueAtTime(vol,ctx.currentTime+start+0.01);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+start+dur);
        o.start(ctx.currentTime+start);
        o.stop(ctx.currentTime+start+dur);
      };
      // Chime: ascending notes
      [523,659,784,1047].forEach((f,i)=>playTone(f,i*0.15,0.8,0.4));
    }catch(e){}
  };

  // ─── COMPUTE SALES ALERTS from tracker data ───────────────────────────────
  const computeSalesAlerts=async()=>{
    const today=new Date();
    const todayStr=today.toISOString().split("T")[0]; // "2026-07-04"
    const todayM=String(today.getMonth()+1); // "7"
    const todayD=String(today.getDate()); // "4"
    const todayY=String(today.getFullYear()); // "2026"

    const agentDaySales={}; // {agentName: {date: count}}
    const agentTodaySales={}; // {agentName: count today}

    // Fetch all trackers and parse daily sales
    const allTrackers=await Promise.allSettled(
      Object.entries(DEPT_GIDS).map(async([dept,gid])=>{
        const text=await fetchCSV(gid);
        const lines=text.trim().split("\n").filter(l=>l.trim());
        if(lines.length<2)return{dept,rows:[]};
        const headers=parseCSVLine(lines[0]).map(h=>h.toUpperCase().trim());
        const fb={intl:{agent:1,date:0},dom:{agent:3,date:0},sm:{agent:4,date:0},rob:{agent:4,date:0},corp:{agent:1,date:0}};
        const agentCol=headers.findIndex(h=>h==="AGENT"||h==="AGENTS")||fb[dept].agent;
        const dateCol=0; // always col A
        const rows=[];
        for(let i=1;i<lines.length;i++){
          const v=parseCSVLine(lines[i]);
          const name=(v[agentCol]||"").trim();
          const dateVal=(v[dateCol]||"").trim();
          if(!name||!dateVal)continue;
          rows.push({name,date:dateVal,dept});
        }
        return{dept,rows};
      })
    );

    allTrackers.forEach(r=>{
      if(r.status!=="fulfilled")return;
      r.value.rows.forEach(({name,date,dept})=>{
        const nu=name.toUpperCase();
        // Parse date — "2026-07-04" or "7/4/2026" formats
        let dateKey="";
        if(date.includes("-")&&date.length>=10)dateKey=date.substring(0,10);
        else if(date.includes("/")){
          const p=date.split("/");
          if(p.length>=3)dateKey=p[2]+"-"+p[0].padStart(2,"0")+"-"+p[1].padStart(2,"0");
        }
        if(!dateKey)return;
        if(!agentDaySales[nu])agentDaySales[nu]={name,dept,days:{}};
        agentDaySales[nu].days[dateKey]=(agentDaySales[nu].days[dateKey]||0)+1;
        // Count today's sales
        if(dateKey===todayStr||(date.includes("/")&&date.split("/")[0]===todayM&&date.split("/")[1]===todayD&&date.split("/")[2]===todayY)){
          agentTodaySales[nu]=(agentTodaySales[nu]||0)+1;
        }
      });
    });

    // Compute streaks
    const getStreak=(days)=>{
      const sorted=Object.keys(days).sort().reverse();
      let streak=0;
      let prev=null;
      for(const d of sorted){
        if(!prev){prev=new Date(d);streak=1;continue;}
        const curr=new Date(d);
        const diff=(prev-curr)/(1000*60*60*24);
        if(diff===1){streak++;prev=curr;}
        else break;
      }
      return streak;
    };

    const alerts=[];
    Object.entries(agentDaySales).forEach(([nu,data])=>{
      const streak=getStreak(data.days);
      const todayCount=agentTodaySales[nu]||0;
      const photo=AGENT_PHOTOS[data.name.toUpperCase()]||AGENT_PHOTOS[data.name]||null;
      if(streak>=4)alerts.push({type:"streak",name:data.name,value:streak,dept:data.dept,photo,label:streak+" Day Streak! 🔥"});
      if(todayCount>=4)alerts.push({type:"blitz",name:data.name,value:todayCount,dept:data.dept,photo,label:todayCount+" Sales Today! ⚡"});
    });

    return alerts.sort((a,b)=>b.value-a.value);
  };

                                <tr key={i} style={{background:d.bg,borderTop:("2px solid "+d.color)}}>
                                  <td colSpan={3} style={{padding:"9px 12px",fontWeight:700,color:d.textColor,fontSize:13}}>
                                    <span style={{background:d.color,color:"white",padding:"3px 10px",borderRadius:99,fontSize:11,marginRight:8,fontWeight:700}}>{d.label}</span>
                                    <span style={{fontSize:11,fontWeight:500,opacity:.8}}>{dFiltered.length} agents</span>
                                  </td>
                                  <td style={{padding:"9px 12px",textAlign:"right",color:d.textColor,fontSize:12,fontWeight:600}}>{fmt(d.tgt)}</td>
                                  <td style={{padding:"9px 12px",textAlign:"right",color:d.textColor,fontSize:13,fontWeight:700}}>{fmt(dGP)}</td>
                                  <td style={{padding:"9px 12px",textAlign:"right",color:d.textColor,fontSize:13,fontWeight:700}}>{fmt(dSRP)}</td>
                                  <td style={{padding:"9px 12px",textAlign:"center"}}><Badge val={dComp}/></td>
                                  <td style={{padding:"9px 12px",textAlign:"right"}}>
                                    <span style={{background:dGap>=0?"#d1fae5":"#fee2e2",color:dGap>=0?"#065f46":"#991b1b",fontWeight:700,padding:"3px 9px",borderRadius:6,fontSize:12}}>
                                      {dGap>=0?"+":""}{fmt(dGap)}
                                    </span>
                                  </td>
                                  <td colSpan={2}></td>
                                </tr>
                              );
                            })}
                            {/* Grand Total */}
                            <tr style={{background:"#1e1b4b",borderTop:"3px solid #4f46e5"}}>
                              <td colSpan={3} style={{padding:"11px 12px",fontWeight:700,color:"white",fontSize:14}}>
                                <span style={{background:"#4f46e5",color:"white",padding:"3px 12px",borderRadius:99,fontSize:12,marginRight:8}}>GRAND TOTAL</span>
                                <span style={{fontSize:12,opacity:.7}}>{progressAgents.filter(a=>progressDeptFilter==="All"||a.department===progressDeptFilter).length} agents</span>
                              </td>
                              <td style={{padding:"11px 12px",textAlign:"right",color:"#a5b4fc",fontWeight:700}}>{fmt(progTgt)}</td>
                              <td style={{padding:"11px 12px",textAlign:"right",fontWeight:700,color:"#6ee7b7",fontSize:14}}>{fmt(progGP)}</td>
                              <td style={{padding:"11px 12px",textAlign:"right"}}><span style={{background:"#4f46e5",color:"white",fontWeight:700,padding:"4px 12px",borderRadius:6,fontSize:14}}>{fmt(progTotal)}</span></td>
                              <td style={{padding:"11px 12px",textAlign:"center"}}><Badge val={Math.round(progTotal/progTgt*100)}/></td>
                              <td style={{padding:"11px 12px",textAlign:"right"}}><span style={{background:"#ef4444",color:"white",fontWeight:700,padding:"4px 12px",borderRadius:6}}>-{fmt(progTgt-progTotal)}</span></td>
                              <td colSpan={2}></td>
                            </tr>
                          </tfoot>
                        </table>
                      </div>
                    </div>
                  );
                })()}
              </div>
            )}

          </div>
        </div>
      </div>
      <div style={{padding:"12px 24px 24px",fontSize:11,color:"#9ca3af",textAlign:"center"}}>
        Gladex Travel & Tours · INTL/DOM Sales Dashboard · Data from Google Sheets · Auto-sync every 60s
      </div>

      {/* ─── SALES ALERT MODAL ─────────────────────────────────────────────── */}
      {showSalesAlert&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.75)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}
          onClick={e=>{if(e.target===e.currentTarget)setShowSalesAlert(false);}}>
          <div style={{background:"linear-gradient(135deg,#1e1b4b 0%,#0f172a 100%)",borderRadius:16,width:"100%",maxWidth:800,maxHeight:"85vh",overflowY:"auto",border:"1px solid rgba(255,255,255,.1)",boxShadow:"0 25px 60px rgba(0,0,0,.5)"}}>
            {/* Modal Header */}
            <div style={{padding:"20px 24px",borderBottom:"1px solid rgba(255,255,255,.1)",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div>
                <div style={{fontSize:20,fontWeight:700,color:"white"}}>🏆 Sales Achievements</div>
                <div style={{fontSize:12,color:"rgba(255,255,255,.5)",marginTop:4}}>
                  Real-time monitoring · All departments ·{" "}
                  <a href="/photo-manager.html" target="_blank" style={{color:"#a5b4fc",textDecoration:"none"}}>
                    📷 Manage Photos →
                  </a>
                </div>
              </div>
              <div style={{display:"flex",gap:10,alignItems:"center"}}>
                <button onClick={()=>{
                  setSalesAlertData(null);
                  computeSalesAlerts().then(alerts=>{
                    setSalesAlertData(alerts);
                    if(alerts.some(a=>a.type==="streak"))playGong();
                    else if(alerts.some(a=>a.type==="blitz"))playChime();
                  });
                }} style={{padding:"6px 14px",background:"rgba(255,255,255,.1)",border:"1px solid rgba(255,255,255,.2)",borderRadius:8,color:"white",fontSize:12,cursor:"pointer"}}>
                  🔄 Refresh
                </button>
                <button onClick={()=>setShowSalesAlert(false)}
                  style={{width:32,height:32,borderRadius:"50%",border:"1px solid rgba(255,255,255,.2)",background:"rgba(255,255,255,.1)",color:"white",fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
                  ✕
                </button>
              </div>
            </div>

            {/* Legend */}
            <div style={{padding:"12px 24px",display:"flex",gap:16,borderBottom:"1px solid rgba(255,255,255,.1)"}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:20}}>🔥</span>
                <div>
                  <div style={{fontSize:12,fontWeight:700,color:"#fbbf24"}}>Day Streak</div>
                  <div style={{fontSize:10,color:"rgba(255,255,255,.4)"}}>4+ consecutive days with sale</div>
                </div>
              </div>
              <div style={{width:1,background:"rgba(255,255,255,.1)"}}></div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:20}}>⚡</span>
                <div>
                  <div style={{fontSize:12,fontWeight:700,color:"#60a5fa"}}>Daily Blitz</div>
                  <div style={{fontSize:10,color:"rgba(255,255,255,.4)"}}>4+ sales in a single day</div>
                </div>
              </div>
            </div>

            {/* Content */}
            <div style={{padding:24}}>
              {!salesAlertData?(
                <div style={{textAlign:"center",padding:"40px",color:"rgba(255,255,255,.5)"}}>
                  <div style={{fontSize:40,marginBottom:12}}>⏳</div>
                  <div>Analyzing sales data from all departments...</div>
                </div>
              ):salesAlertData.length===0?(
                <div style={{textAlign:"center",padding:"40px",color:"rgba(255,255,255,.5)"}}>
                  <div style={{fontSize:40,marginBottom:12}}>📊</div>
                  <div style={{fontSize:16,fontWeight:600,marginBottom:8}}>No achievements yet today</div>
                  <div style={{fontSize:13}}>Achievements unlock at 4 consecutive days or 4 sales in a day</div>
                </div>
              ):(
                <div>
                  {/* Streak Achievements */}
                  {salesAlertData.filter(a=>a.type==="streak").length>0&&(
                    <div style={{marginBottom:24}}>
                      <div style={{fontSize:14,fontWeight:700,color:"#fbbf24",marginBottom:14,display:"flex",alignItems:"center",gap:8}}>
                        🔥 Day Streak Achievers
                        <span style={{background:"rgba(251,191,36,.2)",border:"1px solid rgba(251,191,36,.4)",color:"#fbbf24",fontSize:11,padding:"2px 8px",borderRadius:99}}>{salesAlertData.filter(a=>a.type==="streak").length} agents</span>
                      </div>
                      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:12}}>
                        {salesAlertData.filter(a=>a.type==="streak").map((a,i)=>(
                          <div key={i} style={{background:"linear-gradient(135deg,rgba(251,191,36,.15),rgba(239,68,68,.1))",border:"1px solid rgba(251,191,36,.3)",borderRadius:12,padding:16,textAlign:"center",position:"relative",overflow:"hidden"}}>
                            <div style={{position:"absolute",top:8,right:10,fontSize:28,opacity:.15}}>🔥</div>
                            {/* Agent Photo */}
                            <div style={{width:72,height:72,borderRadius:"50%",margin:"0 auto 10px",border:"3px solid #fbbf24",overflow:"hidden",background:"linear-gradient(135deg,#4f46e5,#7c3aed)",display:"flex",alignItems:"center",justifyContent:"center"}}>
                              {a.photo?(
                                <img src={a.photo} alt={a.name} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                              ):(
                                <div style={{fontSize:28,fontWeight:700,color:"white"}}>
                                  {a.name.split(" ").map(w=>w[0]).slice(0,2).join("")}
                                </div>
                              )}
                            </div>
                            <div style={{fontSize:13,fontWeight:700,color:"white",marginBottom:4}}>{a.name}</div>
                            <div style={{fontSize:11,color:"rgba(255,255,255,.5)",marginBottom:8}}>{a.dept}</div>
                            <div style={{background:"rgba(251,191,36,.2)",border:"1px solid rgba(251,191,36,.4)",borderRadius:8,padding:"6px 10px"}}>
                              <div style={{fontSize:24,fontWeight:700,color:"#fbbf24"}}>{a.value}</div>
                              <div style={{fontSize:10,color:"rgba(255,255,255,.6)"}}>Consecutive Days 🔥</div>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                  {/* Daily Blitz Achievements */}
                  {salesAlertData.filter(a=>a.type==="blitz").length>0&&(
                    <div>
                      <div style={{fontSize:14,fontWeight:700,color:"#60a5fa",marginBottom:14,display:"flex",alignItems:"center",gap:8}}>
                        ⚡ Daily Blitz Achievers
                        <span style={{background:"rgba(96,165,250,.2)",border:"1px solid rgba(96,165,250,.4)",color:"#60a5fa",fontSize:11,padding:"2px 8px",borderRadius:99}}>{salesAlertData.filter(a=>a.type==="blitz").length} agents</span>
                      </div>
                      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:12}}>
                        {salesAlertData.filter(a=>a.type==="blitz").map((a,i)=>(
                          <div key={i} style={{background:"linear-gradient(135deg,rgba(96,165,250,.15),rgba(139,92,246,.1))",border:"1px solid rgba(96,165,250,.3)",borderRadius:12,padding:16,textAlign:"center",position:"relative",overflow:"hidden"}}>
                            <div style={{position:"absolute",top:8,right:10,fontSize:28,opacity:.15}}>⚡</div>
                            <div style={{width:72,height:72,borderRadius:"50%",margin:"0 auto 10px",border:"3px solid #60a5fa",overflow:"hidden",background:"linear-gradient(135deg,#0ea5e9,#4f46e5)",display:"flex",alignItems:"center",justifyContent:"center"}}>
                              {a.photo?(
                                <img src={a.photo} alt={a.name} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                              ):(
                                <div style={{fontSize:28,fontWeight:700,color:"white"}}>
                                  {a.name.split(" ").map(w=>w[0]).slice(0,2).join("")}
                                </div>
                              )}
                            </div>
                            <div style={{fontSize:13,fontWeight:700,color:"white",marginBottom:4}}>{a.name}</div>
                            <div style={{fontSize:11,color:"rgba(255,255,255,.5)",marginBottom:8}}>{a.dept}</div>
                            <div style={{background:"rgba(96,165,250,.2)",border:"1px solid rgba(96,165,250,.4)",borderRadius:8,padding:"6px 10px"}}>
                              <div style={{fontSize:24,fontWeight:700,color:"#60a5fa"}}>{a.value}</div>
                              <div style={{fontSize:10,color:"rgba(255,255,255,.6)"}}>Sales Today ⚡</div>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
